<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f2ea;
            --env-bg: #c3a67f;
            --env-inside: #9f825c;
            --env-flap: #cfb695;
            --paper-color: #fffefb;
            --gold: #d4af37;
            --burgundy: #5c0632;
            --text-color: #333333;
            --shadow: rgba(45, 35, 20, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            perspective: 1200px;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 460px;
            height: 310px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* 3D Envelope Container */
        .envelope-container {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            box-shadow: 0 12px 35px var(--shadow);
            border-radius: 6px;
            background-color: var(--env-bg);
            transform: rotateX(0deg) translateY(0);
        }

        /* Envelope inside shadows */
        .envelope-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--env-inside);
            border-radius: 6px;
            z-index: 1;
        }

        /* Envelope Flap */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 52%;
            background-color: var(--env-flap);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transform-origin: top;
            z-index: 4;
            transform: rotateX(0deg);
        }

        /* Envelope Pocket */
        .envelope-pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--env-bg);
            clip-path: polygon(0 40%, 50% 65%, 100% 40%, 100% 100%, 0 100%);
            border-radius: 0 0 6px 6px;
            z-index: 3;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.04);
        }

        /* Invitation Letter Card */
        .letter {
            position: absolute;
            bottom: 6px;
            left: 3%;
            width: 94%;
            height: 90%;
            background-color: var(--paper-color);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            z-index: 2;
            padding: 8px;
            transform: translateY(0) scale(1);
        }

        .letter-border {
            border: 1px solid rgba(212, 175, 55, 0.25);
            height: 100%;
            width: 100%;
            padding: 10px;
            position: relative;
        }

        .letter-content {
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        /* Gold Corner Ornaments */
        .corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.6;
            pointer-events: none;
        }
        .c-top-left { top: 5px; left: 5px; border-width: 1px 0 0 1px; }
        .c-top-right { top: 5px; right: 5px; border-width: 1px 1px 0 0; }
        .c-bottom-left { bottom: 5px; left: 5px; border-width: 0 0 1px 1px; }
        .c-bottom-right { bottom: 5px; right: 5px; border-width: 0 1px 1px 0; }

        /* Letter Inner Layout Grid */
        .letter-grid {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .col-left {
            flex: 1;
            border-right: 1px solid rgba(212, 175, 55, 0.2);
            padding-right: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .col-right {
            flex: 1.35;
            padding-left: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        /* Invitation Typography */
        .badge {
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: #777;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .names {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            margin-bottom: 8px;
        }

        .names .name {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--burgundy);
            white-space: nowrap;
        }

        .names .amp {
            font-family: 'Great Vibes', cursive;
            font-size: 1.4rem;
            color: var(--gold);
            line-height: 0.8;
        }

        .divider-gold {
            color: var(--gold);
            font-size: 0.6rem;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        .invitation-hdr {
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            color: var(--burgundy);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .invitation-txt {
            font-size: 0.62rem;
            color: #555;
            line-height: 1.4;
            margin-bottom: 8px;
            max-width: 220px;
            font-family: 'Cormorant Garamond', serif;
        }

        .details-box {
            background-color: rgba(253, 244, 245, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 4px;
            padding: 6px 8px;
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 100%;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 4px;
            text-align: left;
        }

        .lbl {
            font-size: 0.5rem;
            letter-spacing: 1px;
            color: #777;
            font-weight: 600;
            width: 55px;
            flex-shrink: 0;
        }

        .txt {
            font-size: 0.55rem;
            color: var(--burgundy);
            font-weight: 500;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem;
            color: var(--gold);
            line-height: 1;
        }

        /* Controls */
        .controls {
            margin-top: 50px;
            z-index: 10;
        }

        .btn-replay {
            background-color: var(--burgundy);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(92, 6, 50, 0.2);
            transition: transform 0.2s, background-color 0.2s;
            font-family: 'Playfair Display', serif;
        }

        .btn-replay:hover {
            background-color: #450324;
            transform: translateY(-2px);
        }

        /* ANIMATION TIMELINES (CSS KEYFRAMES + TRANSITIONS) */
        
        /* 1. Flap opens first (0.0s to 0.8s) */
        .wrapper.animate .envelope-flap {
            animation: flapOpen 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes flapOpen {
            0% { transform: rotateX(0deg); z-index: 4; }
            45% { transform: rotateX(90deg); z-index: 4; }
            46% { transform: rotateX(91deg); z-index: 1; }
            100% { transform: rotateX(180deg); z-index: 1; }
        }

        /* 2. Letter flies out and scales up (0.6s to 2.0s) */
        .wrapper.animate .letter {
            animation: letterFly 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.6s;
        }

        @keyframes letterFly {
            0% { transform: translateY(0) scale(1); z-index: 2; }
            35% { transform: translateY(-55%) scale(1.05); z-index: 5; box-shadow: 0 -5px 15px rgba(0,0,0,0.06); }
            100% { transform: translateY(-118%) scale(1.65); z-index: 5; box-shadow: 0 15px 35px rgba(0,0,0,0.15), 0 0 20px rgba(212, 175, 55, 0.15); }
        }

        /* 3. Envelope body tilts backward for 3D realism (1.0s to 1.8s) */
        .wrapper.animate .envelope-container {
            animation: envTilt 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.0s;
        }

        @keyframes envTilt {
            0% { transform: rotateX(0deg) translateY(0); }
            100% { transform: rotateX(22deg) translateY(35px) scale(0.9); }
        }

        /* 4. Text content inside letter fades in (1.5s to 2.1s) */
        .wrapper.animate .letter-content {
            animation: textFadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.5s;
        }

        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* MOBILE RESPONSIVE ADAPTATIONS */
        @media (max-width: 600px) {
            .wrapper {
                max-width: 320px;
                height: 220px;
            }
            .wrapper.animate .letter {
                animation: letterFlyMobile 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.6s;
            }
            .wrapper.animate .envelope-container {
                animation: envTiltMobile 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.0s;
            }
            .letter-grid {
                flex-direction: column;
                gap: 6px;
                justify-content: center;
            }
            .col-left {
                border-right: none;
                border-bottom: 1px dashed rgba(212, 175, 55, 0.15);
                padding-right: 0;
                padding-bottom: 6px;
                width: 100%;
                height: auto;
            }
            .col-right {
                padding-left: 0;
                padding-top: 6px;
                width: 100%;
                height: auto;
            }
            .names .name { font-size: 0.8rem; }
            .names .amp { font-size: 1.1rem; }
            .invitation-hdr { font-size: 0.65rem; }
            .invitation-txt { font-size: 0.55rem; max-width: 100%; }
            .details-box { padding: 4px 6px; }
            .lbl { width: 45px; font-size: 0.45rem; }
            .txt { font-size: 0.48rem; }
            .signature { font-size: 1.1rem; }
        }

        @keyframes letterFlyMobile {
            0% { transform: translateY(0) scale(1); z-index: 2; }
            35% { transform: translateY(-50%) scale(1.02); z-index: 5; box-shadow: 0 -5px 12px rgba(0,0,0,0.06); }
            100% { transform: translateY(-90%) scale(1.12); z-index: 5; box-shadow: 0 10px 25px rgba(0,0,0,0.12), 0 0 15px rgba(212, 175, 55, 0.1); }
        }

        @keyframes envTiltMobile {
            0% { transform: rotateX(0deg) translateY(0); }
            100% { transform: rotateX(15deg) translateY(20px) scale(0.95); }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="wrapper">
        <div class="envelope-container">
            <!-- Envelope Flap -->
            <div class="envelope-flap"></div>
            <!-- Envelope Pocket -->
            <div class="envelope-pocket"></div>
            <!-- Invitation Letter -->
            <div class="letter">
                <div class="letter-border">
                    <div class="corner c-top-left"></div>
                    <div class="corner c-top-right"></div>
                    <div class="corner c-bottom-left"></div>
                    <div class="corner c-bottom-right"></div>

                    <div class="letter-content">
                        <div class="letter-grid">
                            <!-- Left: Bride & Groom -->
                            <div class="col-left">
                                <span class="badge">SAVE THE DATE</span>
                                <div class="names">
                                    <span class="name">Lê Phạm Hoàng Mây</span>
                                    <span class="amp">&</span>
                                    <span class="name">Nguyễn Đức Hùng</span>
                                </div>
                                <div class="divider-gold">✦ ✦ ✦</div>
                            </div>

                            <!-- Right: Invitation Info -->
                            <div class="col-right">
                                <h3 class="invitation-hdr">TRÂN TRỌNG KÍNH MỜI</h3>
                                <p class="invitation-txt">
                                    Đến dự buổi tiệc thành hôn chung vui cùng gia đình chúng tôi tại trung tâm tổ chức sự kiện.
                                </p>
                                <div class="details-box">
                                    <div class="row">
                                        <span class="lbl">THỜI GIAN:</span>
                                        <span class="txt">17:30 | Thứ Sáu, 24.07.2026</span>
                                    </div>
                                    <div class="row">
                                        <span class="lbl">ĐỊA ĐIỂM:</span>
                                        <span class="txt">Grand Palace, Sảnh Platinum</span>
                                    </div>
                                    <div class="row">
                                        <span class="lbl">ĐỊA CHỈ:</span>
                                        <span class="txt">142/18 Cộng Hòa, Q. Tân Bình</span>
                                    </div>
                                </div>
                                <p class="signature">Mây & Hùng</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-replay" id="btn-replay">XEM LẠI</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wrapper = document.getElementById('wrapper');
            const replayBtn = document.getElementById('btn-replay');

            // Plays envelope sequence: Flap (0s) -> Letter slide out (0.6s) -> Tilt (1.0s) -> Text fade (1.5s)
            function playAnimation() {
                wrapper.classList.remove('animate');
                void wrapper.offsetWidth; // Force CSS reflow to restart keyframes
                wrapper.classList.add('animate');
            }

            // Start animation automatically on page load
            setTimeout(playAnimation, 500);

            // Controls
            replayBtn.addEventListener('click', playAnimation);
            wrapper.addEventListener('click', playAnimation);
        });
    </script>
</body>
</html>
