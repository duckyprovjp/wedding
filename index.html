<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lễ Cưới & Đếm Ngược Ngày Trọng Đại</title>
  
  <!-- Premium elegant fonts from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* -------------------------------------------------------------
       DESIGN SYSTEM & VARIABLES
       ------------------------------------------------------------- */
    :root {
      --color-bg: #151518;
      --color-kraft: #d2b48c;
      --color-kraft-dark: #b8976c;
      --color-kraft-light: #e6cba5;
      --color-paper: #FFFDFB;
      --color-accent: #8a3033;
      --color-slate: #2f3542;
      --easing: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--color-bg);
      background-image: radial-gradient(rgba(210, 180, 140, 0.05) 1px, transparent 0);
      background-size: 24px 24px;
      font-family: 'Playfair Display', serif;
      overflow: hidden;
      perspective: 1200px;
    }

    /* -------------------------------------------------------------
       BACKDROP EFFECT
       ------------------------------------------------------------- */
    .backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(10, 10, 12, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 8;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s var(--easing);
    }
    .backdrop.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    /* -------------------------------------------------------------
       ENVELOPE STRUCTURE
       ------------------------------------------------------------- */
    .envelope-container {
      position: relative;
      width: 400px;
      height: 280px;
      transform-style: preserve-3d;
      cursor: pointer;
      z-index: 5;
      transition: transform 0.8s var(--easing);
    }

    /* Tabletop tilt flat when open */
    .envelope-container.is-open {
      transform: rotateX(25deg) scale(0.95) translateY(30px);
    }

    .envelope-inside {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #cfa878 0%, #a37f53 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      z-index: 1;
    }

    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 52%;
      background-color: var(--color-kraft-light);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      transform-origin: top;
      z-index: 4;
      transition: transform 0.6s var(--easing), z-index 0.05s linear 0.3s;
      transform: rotateX(0deg);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Flip flap open and adjust z-index to fall behind inside wall */
    .envelope-container.is-open .envelope-flap {
      transform: rotateX(180deg);
      z-index: 1;
    }

    .envelope-pocket {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--color-kraft);
      clip-path: polygon(0 35%, 50% 60%, 100% 35%, 100% 100%, 0 100%);
      border-radius: 0 0 6px 6px;
      z-index: 3;
      box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.08);
    }

    /* -------------------------------------------------------------
       INVITATION LETTER
       ------------------------------------------------------------- */
    .letter {
      position: absolute;
      bottom: 6px;
      left: 4%;
      width: 92%;
      height: 90%;
      background-color: var(--color-paper);
      border-radius: 4px;
      z-index: 2;
      padding: 16px;
      box-sizing: border-box;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(210, 180, 140, 0.3);
      transition: transform 0.8s var(--easing), z-index 0s linear 0.4s, box-shadow 0.8s var(--easing);
      transform: translateY(0) scale(1);
    }

    /* Step 2: Slide up from pocket and scale slightly */
    .letter.is-slid {
      transform: translateY(-55%) scale(1.05);
      z-index: 10;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    /* Step 3: Zoom full screen modal overlay */
    .letter.is-zoomed {
      transform: translateY(-15%) scale(2.2);
      z-index: 10;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(210, 180, 140, 0.15);
    }

    .letter-border {
      border: 1px solid rgba(138, 48, 51, 0.2);
      border-radius: 3px;
      height: 100%;
      width: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      padding: 8px;
    }

    /* Gold Card Corner Ornaments */
    .corner-ornament {
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--color-kraft-dark);
      border-style: solid;
      opacity: 0.5;
    }
    .ornament-top-left { top: 4px; left: 4px; border-width: 1.5px 0 0 1.5px; }
    .ornament-top-right { top: 4px; right: 4px; border-width: 1.5px 1.5px 0 0; }
    .ornament-bottom-left { bottom: 4px; left: 4px; border-width: 0 0 1.5px 1.5px; }
    .ornament-bottom-right { bottom: 4px; right: 4px; border-width: 0 1.5px 1.5px 0; }

    /* -------------------------------------------------------------
       INVITATION CONTENT
       ------------------------------------------------------------- */
    .letter-content {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
    }

    .letter-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--color-kraft-dark);
      margin: 0 0 4px 0;
    }

    .letter-names {
      font-family: 'Great Vibes', cursive;
      font-size: 1.4rem;
      color: var(--color-accent);
      margin: 0 0 6px 0;
    }

    /* Small/Large message blocks switching */
    .letter-body-short {
      font-size: 0.65rem;
      color: var(--color-slate);
      font-style: italic;
      opacity: 1;
      max-height: 50px;
      transition: opacity 0.4s var(--easing), max-height 0.4s var(--easing);
    }
    .letter.is-zoomed .letter-body-short {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      margin: 0;
    }

    .letter-body-full {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      transition: opacity 0.5s var(--easing) 0.2s, max-height 0s linear 0.2s;
    }
    .letter.is-zoomed .letter-body-full {
      opacity: 1;
      max-height: 600px;
      overflow: visible;
    }

    .invitation-text {
      font-size: 0.48rem;
      line-height: 1.4;
      color: var(--color-slate);
      max-width: 170px;
      margin: 4px 0 10px 0;
    }

    .details-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      max-width: 170px;
      background-color: rgba(210, 180, 140, 0.08);
      border: 1px solid rgba(210, 180, 140, 0.15);
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.45rem;
      font-weight: 500;
    }

    .detail-item strong {
      color: var(--color-accent);
      letter-spacing: 0.5px;
    }

    .detail-item span {
      color: var(--color-slate);
    }

    .signature {
      font-family: 'Great Vibes', cursive;
      font-size: 1.1rem;
      color: var(--color-accent);
      margin: 2px 0 0 0;
    }

    .letter-close {
      position: absolute;
      top: 6px;
      right: 6px;
      background: none;
      border: none;
      font-size: 0.8rem;
      color: #aaa;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--easing), color 0.2s var(--easing);
      z-index: 12;
    }
    .letter.is-zoomed .letter-close {
      opacity: 1;
      pointer-events: auto;
    }
    .letter-close:hover {
      color: var(--color-accent);
    }

    /* -------------------------------------------------------------
       WET WAX SEAL EMBELLISHMENT
       ------------------------------------------------------------- */
    .wax-seal {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #eec778 40%, #c49949 100%);
      border-radius: 50%;
      z-index: 5;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18), inset 0 2px 3px rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s var(--easing), transform 0.4s var(--easing);
    }
    .wax-seal:hover {
      transform: translate(-50%, -50%) scale(1.08);
    }
    .seal-inner {
      font-family: 'Great Vibes', cursive;
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--color-accent);
      border: 1px dashed rgba(138, 48, 51, 0.3);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Seal drop animation when open */
    .envelope-container.is-open .wax-seal {
      opacity: 0;
      transform: translate(-50%, 30px) rotate(15deg) scale(0.8);
      pointer-events: none;
      transition: opacity 0.3s var(--easing), transform 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    /* -------------------------------------------------------------
       CONTROLS & ACTION BUTTONS
       ------------------------------------------------------------- */
    .controls {
      margin-top: 40px;
      z-index: 10;
      display: flex;
      gap: 16px;
    }

    .btn-replay {
      background-color: transparent;
      border: 1px solid rgba(210, 180, 140, 0.4);
      color: var(--color-kraft-light);
      padding: 10px 24px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      font-weight: 500;
      text-transform: uppercase;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s var(--easing);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .btn-replay:hover {
      background-color: var(--color-kraft-light);
      color: var(--color-bg);
      border-color: var(--color-kraft-light);
      box-shadow: 0 6px 12px rgba(230, 203, 165, 0.2);
    }

    /* -------------------------------------------------------------
       ANIMATION RESET CLASS
       ------------------------------------------------------------- */
    .no-transition *,
    .no-transition *::before,
    .no-transition *::after {
      transition: none !important;
      animation: none !important;
    }

    /* -------------------------------------------------------------
       RESPONSIVE ADJUSTMENTS
       ------------------------------------------------------------- */
    @media (max-width: 768px) {
      .envelope-container {
        transform: scale(0.85);
      }
      .envelope-container.is-open {
        transform: rotateX(25deg) scale(0.8) translateY(20px);
      }
      .letter.is-zoomed {
        transform: translateY(-20%) scale(1.55);
      }
    }

    @media (max-width: 480px) {
      .envelope-container {
        transform: scale(0.72);
      }
      .envelope-container.is-open {
        transform: rotateX(25deg) scale(0.68) translateY(10px);
      }
      .letter.is-zoomed {
        transform: translateY(-20%) scale(1.3);
      }
    }
  </style>
</head>
<body>

  <!-- Backdrop overlay when letter zoomed -->
  <div class="backdrop" id="backdrop"></div>

  <!-- Main Envelope Container -->
  <div class="envelope-container" id="envelope">
    <!-- Flap top -->
    <div class="envelope-flap"></div>
    
    <!-- Inside Back Wall -->
    <div class="envelope-inside"></div>
    
    <!-- Floating Letter Card -->
    <div class="letter" id="letter">
      <div class="letter-border">
        <div class="corner-ornament ornament-top-left"></div>
        <div class="corner-ornament ornament-top-right"></div>
        <div class="corner-ornament ornament-bottom-left"></div>
        <div class="corner-ornament ornament-bottom-right"></div>
        
        <button class="letter-close" id="letterClose" aria-label="Đóng thư">×</button>

        <div class="letter-content">
          <span class="letter-badge">SAVE THE DATE</span>
          <h2 class="letter-names">Mây & Hùng</h2>
          
          <!-- Small/Short invitation intro -->
          <div class="letter-body-short">
            <p>Trân Trọng Kính Mời</p>
          </div>
          
          <!-- Detailed invitation content (revealed on zoom) -->
          <div class="letter-body-full">
            <p class="invitation-text">
              Đến dự buổi tiệc chung vui, chứng kiến khoảnh khắc chúng tôi chính thức nên duyên vợ chồng.
            </p>
            <div class="details-grid">
              <div class="detail-item">
                <strong>NGÀY CƯỚI</strong>
                <span>Thứ Sáu, 24.07.2026</span>
              </div>
              <div class="detail-item">
                <strong>THỜI GIAN</strong>
                <span>17:30 Đón Khách | 18:00 Khai Tiệc</span>
              </div>
              <div class="detail-item">
                <strong>ĐỊA ĐIỂM</strong>
                <span>Grand Palace, Sảnh Platinum</span>
              </div>
            </div>
            <p class="signature">Mây & Hùng</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Envelope pocket body -->
    <div class="envelope-pocket"></div>
    
    <!-- Wax seal -->
    <div class="wax-seal" id="seal">
      <div class="seal-inner">M&H</div>
    </div>
  </div>

  <!-- Controller actions -->
  <div class="controls">
    <button class="btn-replay" id="btnReplay">Replay</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const envelope = document.getElementById('envelope');
      const letter = document.getElementById('letter');
      const backdrop = document.getElementById('backdrop');
      const btnReplay = document.getElementById('btnReplay');
      const letterClose = document.getElementById('letterClose');
      
      let state = 'closed'; // State machine: 'closed', 'opening', 'open', 'closing'
      let timeouts = [];

      function clearAllTimeouts() {
        timeouts.forEach(t => clearTimeout(t));
        timeouts = [];
      }

      // Step-by-step trigger timelines
      function openSequence() {
        if (state !== 'closed') return;
        state = 'opening';

        // 1. Flip lid flap open (starts at 0s)
        envelope.classList.add('is-open');

        // 2. Slide letter up from inside (starts at 0.5s when flap is fully vertical/backwards)
        timeouts.push(setTimeout(() => {
          letter.classList.add('is-slid');
        }, 500));

        // 3. Zoom letter into modal (starts at 1.1s when slide-up is complete)
        timeouts.push(setTimeout(() => {
          letter.classList.add('is-zoomed');
          backdrop.classList.add('is-active');
          state = 'open';
        }, 1100));
      }

      function closeSequence() {
        if (state !== 'open') return;
        state = 'closing';

        // 1. Zoom out letter (starts at 0s)
        letter.classList.remove('is-zoomed');
        backdrop.classList.remove('is-active');

        // 2. Slide letter back inside pocket (starts at 0.4s)
        timeouts.push(setTimeout(() => {
          letter.classList.remove('is-slid');
        }, 400));

        // 3. Flip lid flap closed (starts at 0.9s)
        timeouts.push(setTimeout(() => {
          envelope.classList.remove('is-open');
          state = 'closed';
        }, 900));
      }

      // Clicking envelope triggers open/close sequence
      envelope.addEventListener('click', (e) => {
        if (state === 'closed') {
          openSequence();
        } else if (state === 'open' && !e.target.closest('.letter-content')) {
          closeSequence();
        }
      });

      // Closing from the modal close icon
      letterClose.addEventListener('click', (e) => {
        e.stopPropagation();
        closeSequence();
      });

      // Clicking background overlay closes it
      backdrop.addEventListener('click', (e) => {
        closeSequence();
      });

      // Reset and run sequence instantly
      btnReplay.addEventListener('click', (e) => {
        e.stopPropagation();
        clearAllTimeouts();

        // 1. Add no-transition reset
        document.body.classList.add('no-transition');
        envelope.classList.remove('is-open');
        letter.classList.remove('is-slid', 'is-zoomed');
        backdrop.classList.remove('is-active');
        state = 'closed';

        // Force browser render flush
        void envelope.offsetHeight;

        // 2. Remove reset tag and trigger open sequence
        document.body.classList.remove('no-transition');
        setTimeout(openSequence, 100);
      });
    });
  </script>
</body>
</html>
